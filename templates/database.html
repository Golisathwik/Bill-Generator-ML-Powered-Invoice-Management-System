<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sankalpa Enterprises - Item Database</title>
    <script src="{{ url_for('static', filename='js/tailwind.min.js') }}"></script>

<link rel="stylesheet" href="{{ url_for('static', filename='css/all.min.css') }}" />

<link rel="stylesheet" href="{{ url_for('static', filename='css/inter_fonts.css') }}" />

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="flex flex-col min-h-screen">

        <!-- Header -->
        <header class="bg-white shadow-sm sticky top-0 z-10">
            <div class="container mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center">
                <img class="h-12 w-auto" src="{{ url_for('static', filename='images/logo1.png') }}" alt="Sankalpa Enterprises Logo">
            </div>

                    <nav class="hidden md:flex items-center space-x-8">
                        <a href="{{ url_for('home') }}" class="nav-link text-gray-600 hover:text-blue-600 font-medium pb-1 transition duration-150 ease-in-out">Home</a>
                        <a href="{{ url_for('bill_management') }}" class="nav-link text-gray-600 hover:text-blue-600 font-medium pb-1 transition duration-150 ease-in-out">Bill</a>
                        <a href="#" class="text-gray-600 hover:text-blue-600 font-medium">Data Analysis</a>
                        <a href="{{ url_for('database') }}" class="nav-link text-gray-600 hover:text-blue-600 font-medium pb-1 transition duration-150 ease-in-out active">Database</a>
                        <a href="{{ url_for('payment_tracker') }}" class="nav-link text-gray-600 hover:text-blue-600 font-medium pb-1 transition duration-150 ease-in-out">Payment Tracker</a>
                        <a href="{{ url_for('todo') }}" class="nav-link text-gray-600 hover:text-blue-600 font-medium pb-1 transition duration-150 ease-in-out">To-do List</a>
                    </nav>

                    <div class="flex items-center space-x-4">
                        <span class="text-sm font-medium text-gray-600">Welcome, {{ current_user.username }}</span>
                        <a href="{{ url_for('logout') }}" title="Logout" class="p-2 rounded-full hover:bg-gray-100">
                            <i class="fa-solid fa-right-from-bracket text-gray-600"></i>
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-grow container mx-auto p-4 sm:p-6 lg:p-8">

            <div id="database-page">
                <div class="mb-6">
                    <h1 class="text-3xl font-bold text-gray-900">Item Database</h1>
                    <p class="text-gray-500 mt-1">Add, edit, and manage all your reusable items.</p>
                </div>

                <div class="bg-white p-6 rounded-lg shadow-md">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                        <div class="relative w-full md:w-1/2 lg:w-1/3">
                            <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="search-items-db" placeholder="Search by item name..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <button id="add-new-item-btn" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-blue-700 transition-colors duration-300 flex items-center space-x-2">
                            <i class="fa-solid fa-plus"></i>
                            <span>Add New Item</span>
                        </button>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="bg-gray-100 text-gray-600 uppercase text-sm">
                                    <th class="py-3 px-4 font-semibold">S.No.</th>
                                    <th class="py-3 px-4 font-semibold">Item Name</th>
                                    <th class="py-3 px-4 font-semibold">Unit</th>
                                    <th class="py-3 px-4 font-semibold">HSN</th>
                                    <th class="py-3 px-4 font-semibold">CGST (%)</th>
                                    <th class="py-3 px-4 font-semibold">SGST (%)</th>
                                    <th class="py-3 px-4 font-semibold text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="item-database-body" class="text-gray-700">
                                <!-- Item rows will be inserted here by JavaScript -->
                            </tbody>
                        </table>
                    </div>
                    <!-- ADD THIS ENTIRE BLOCK BELOW -->
                    <div class="flex justify-between items-center mt-6">
                        <button id="show-all-btn" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-semibold hover:bg-blue-700 transition-colors duration-300">Show All</button>
                        <p id="item-count-display" class="text-sm text-gray-500"></p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Item Modal -->
    <div id="item-modal" class="modal fixed inset-0 bg-gray-600 bg-opacity-50 hidden items-center justify-center z-50">
    <div class="modal-content bg-white rounded-lg shadow-xl w-full max-w-lg">
        <div class="modal-header flex justify-between items-center p-4 border-b">
            <h2 id="modal-title" class="text-xl font-bold">Add New Item</h2>
            <button id="close-modal-btn" class="text-gray-500 hover:text-gray-800 text-2xl leading-none">&times;</button>
        </div>
        <div class="modal-body p-6">
            <form id="item-modal-form">
                <input type="hidden" id="item-id-input">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
                    <!-- Item Name -->
                    <div class="md:col-span-2">
                        <label for="item-name-input" class="block text-sm font-medium text-gray-700">Item Name</label>
                        <input type="text" id="item-name-input" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <!-- Unit -->
                    <div>
                        <label for="item-unit-input" class="block text-sm font-medium text-gray-700">Unit</label>
                        <input type="text" id="item-unit-input" required value="Nos" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <!-- HSN -->
                    <div>
                        <label for="item-hsn-input" class="block text-sm font-medium text-gray-700">HSN</label>
                        <input type="text" id="item-hsn-input" placeholder="(Optional)" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <!-- CGST -->
                    <div>
                        <label for="item-cgst-input" class="block text-sm font-medium text-gray-700">CGST (%)</label>
                        <input type="number" step="0.01" id="item-cgst-input" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <!-- SGST -->
                    <div>
                        <label for="item-sgst-input" class="block text-sm font-medium text-gray-700">SGST (%)</label>
                        <input type="number" step="0.01" id="item-sgst-input" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                    </div>
                </div>
            </form>
        </div>
        <div class="modal-footer flex justify-end p-4 bg-gray-50 border-t rounded-b-lg">
            <button type="submit" form="item-modal-form" id="save-item-btn" class="submit-button bg-blue-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-blue-700">Save Item</button>
        </div>
    </div>
</div>

    <script src="{{ url_for('static', filename='js/database.js') }}"></script>
    <script src="{{ url_for('static', filename='js/global-notifications.js') }}"></script>
</body>
</html>
