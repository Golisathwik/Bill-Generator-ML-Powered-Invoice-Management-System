<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sankalpa Enterprises - Payment Tracker</title>
    <script src="{{ url_for('static', filename='js/tailwind.min.js') }}"></script>

<link rel="stylesheet" href="{{ url_for('static', filename='css/all.min.css') }}" />

<link rel="stylesheet" href="{{ url_for('static', filename='css/inter_fonts.css') }}" />

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="flex flex-col min-h-screen">

        <!-- Header -->
        <header class="bg-white shadow-sm sticky top-0 z-10">
            <div class="container mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center">
                <img class="h-12 w-auto" src="{{ url_for('static', filename='images/logo1.png') }}" alt="Sankalpa Enterprises Logo">
            </div>
                    <nav class="hidden md:flex items-center space-x-8">
                        <a href="{{ url_for('home') }}" class="nav-link text-gray-600 hover:text-blue-600 font-medium pb-1 transition duration-150 ease-in-out">Home</a>
                        <a href="{{ url_for('bill_management') }}" class="nav-link text-gray-600 hover:text-blue-600 font-medium pb-1 transition duration-150 ease-in-out">Bill</a>
                        <a href="#" class="text-gray-600 hover:text-blue-600 font-medium">Data Analysis</a>
                        <a href="{{ url_for('database') }}" class="nav-link text-gray-600 hover:text-blue-600 font-medium pb-1 transition duration-150 ease-in-out">Database</a>
                        <a href="{{ url_for('payment_tracker') }}" class="nav-link text-gray-600 hover:text-blue-600 font-medium pb-1 transition duration-150 ease-in-out active">Payment Tracker</a>
                        <a href="{{ url_for('todo') }}" class="nav-link text-gray-600 hover:text-blue-600 font-medium pb-1 transition duration-150 ease-in-out">To-do List</a>
                    </nav>
                    <div class="flex items-center space-x-4">
                        <span class="text-sm font-medium text-gray-600">Welcome, {{ current_user.username }}</span>
                        <a href="{{ url_for('logout') }}" title="Logout" class="p-2 rounded-full hover:bg-gray-100">
                            <i class="fa-solid fa-right-from-bracket text-gray-600"></i>
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-grow container mx-auto p-4 sm:p-6 lg:p-8">
            <div id="payment-tracker-page">
                <div class="mb-6">
                    <h1 class="text-3xl font-bold text-gray-900">Payment Tracker</h1>
                    <p class="text-gray-500 mt-1">Track the payment status of all your bills.</p>
                </div>

                <!-- Controls: Search and Filter -->
                <div class="mb-6 flex flex-col md:flex-row gap-4 items-center">
                    <div class="relative w-full md:flex-1">
                        <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="search-payments" placeholder="Search by bill number or amount..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div class="flex items-center space-x-2">
                        <span class="text-sm font-medium text-gray-600">Status:</span>
                        <select id="filter-status" class="border border-gray-300 rounded-lg py-2 px-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <option value="all">All</option>
                            <option value="Pending">Pending</option>
                            <option value="Paid">Paid</option>
                        </select>
                    </div>
                </div>

                <!-- Bill List Container -->
                <div id="bill-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Bill cards will be inserted here by JavaScript -->
                </div>

                <div id="no-bills-message" class="hidden text-center py-12">
                    <i class="fa-solid fa-file-invoice-dollar text-4xl text-gray-300 mb-4"></i>
                    <p class="text-gray-500">No bills found that match your criteria.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/payment-tracker.js') }}"></script>
    <script src="{{ url_for('static', filename='js/global-notifications.js') }}"></script>
</body>
</html>
