            <a href="{{ url_for('bill_management') }}"
              class="nav-link text-gray-600 hover:text-blue-600 font-medium pb-1 transition duration-150 ease-in-out active">Bill</a>
            <a href="#" class="text-gray-600 hover:text-blue-600 font-medium">Data Analysis</a>
            <a href="{{ url_for('database') }}"

              List</a>
          </nav>

          <div class="flex items-center space-x-4">
            <span class="text-sm font-medium text-gray-600">Welcome, {{ current_user.username }}</span>
            <a href="{{ url_for('logout') }}" title="Logout" class="p-2 rounded-full hover:bg-gray-100">
              <i class="fa-solid fa-right-from-bracket text-gray-600"></i>
            </a>
          </div>
        </div>
      </div>
    </header>

    <main class="flex-grow container mx-auto p-4 sm:p-6 lg:p-8">

            <input type="text" id="bill-number-input"
              class="hidden text-3xl font-bold text-gray-900 border-b-2 border-blue-500 focus:outline-none"
              value="BILL-2024-001">
            <p class="text-gray-500 mt-1" id="bill-details-date">
            </p>
          </div>
          <button id="edit-bill-number-btn" class="text-blue-600 hover:text-blue-800">
            <i class="fa-solid fa-pencil"></i>
          </button>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md">
          <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div class="relative w-full md:w-1/2 lg:w-1/3">
              <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
              <input type="text" id="search-bill-items" placeholder="Search items by name, quantity, or amount..."
                class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
            </div>

              <button id="ocr-btn" class="px-3 py-2 border border-gray-300 rounded-lg hover:bg-gray-100"
                title="Add items from image">
                <i class="fa-solid fa-camera text-gray-600"></i>
              </button>
              <button
                class="bg-blue-600 text-white px-3 py-2 rounded-lg font-semibold hover:bg-blue-700 transition-colors duration-300"
                id="addItemBtn">
                <i class="fa-solid fa-plus"></i>
              </button>
              <!-- Menu Button & Dropdown -->
              <div class="relative">
                <button id="menu-btn" class="px-3 py-2 border border-gray-300 rounded-lg hover:bg-gray-100">
                  <i class="fa-solid fa-ellipsis-vertical text-gray-600"></i>
                </button>
                <div id="menu-dropdown"
                  class="hidden absolute right-0 mt-2 w-48 bg-white border border-gray-200 rounded-lg shadow-xl z-10 py-1">
                  <a href="#" class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                    <i class="fa-solid fa-print w-6 mr-2"></i> Print
                  </a>
                  <a href="#" id="download-bill-btn"
                    class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                    <i class="fa-solid fa-download w-6 mr-2"></i> Download
                  </a>
                </div>
              </div>
              <div id="addItemModal" class="modal">
                <div class="modal-content w-full max-w-lg">
                  <div class="modal-header">
                    <h2>Add New Item</h2>
                    <span class="close-button">&times;</span>
                  </div>
                  <div class="modal-body">
                    <form id="itemForm">
                      <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">

                        <div class="md:col-span-2">
                          <label for="itemName" class="block text-sm font-medium text-gray-700">Item Name:</label>
                          <div id="suggestion-container" class="relative mt-1">
                            <input type="text" id="itemName" name="itemName" required
                              class="w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500" />
                          </div>
                        </div>

                        <div>
                          <label for="quantity" class="block text-sm font-medium text-gray-700">Quantity:</label>
                          <input type="number" id="quantity" name="quantity" required
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500" />
                        </div>

                        <div>
                          <label for="unit" class="block text-sm font-medium text-gray-700">Unit:</label>
                          <input type="text" id="unit" name="unit" value="Nos" required
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500" />
                        </div>

                        <div>
                          <label for="hsn" class="block text-sm font-medium text-gray-700">HSN:</label>
                          <input type="text" id="hsn" name="hsn" placeholder="(Optional)"
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500" />
                        </div>

                        <div>
                          <label for="price" class="block text-sm font-medium text-gray-700">Price (per unit):</label>
                          <input type="number" id="price" name="price" step="0.01" required
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500" />
                        </div>

                        <div>
                          <label for="cgst" class="block text-sm font-medium text-gray-700">CGST (%):</label>
                          <input type="number" id="cgst" name="cgst" step="0.01" placeholder="e.g., 9"
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500" />
                        </div>

                        <div>
                          <label for="sgst" class="block text-sm font-medium text-gray-700">SGST (%):</label>
                          <input type="number" id="sgst" name="sgst" step="0.01" placeholder="e.g., 9"
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500" />
                        </div>
                      </div>
                    </form>
                  </div>
                  <div class="modal-footer" id="manual-item-footer">
    <button type="submit" form="itemForm" class="submit-button">
        Add Item to Bill
    </button>
</div>

<div class="modal-footer hidden" id="ocr-item-footer">
    <div class="flex items-center justify-between w-full">
        <div class="flex items-center space-x-2 sm:space-x-4">
            <button type="button" id="ocr-prev-btn" class="p-2 rounded-full hover:bg-gray-200 transition-colors duration-200" title="Previous Item">
                <i class="fa-solid fa-chevron-left text-gray-600"></i>
            </button>
            <span id="ocr-item-counter" class="text-sm font-medium text-gray-500 w-20 text-center"></span>
            <button type="button" id="ocr-next-btn" class="p-2 rounded-full hover:bg-gray-200 transition-colors duration-200" title="Next Item">
                <i class="fa-solid fa-chevron-right text-gray-600"></i>
            </button>
        </div>
        <div class="flex items-center space-x-2 sm:space-x-3">
            <button type="button" id="ocr-delete-btn" class="text-red-500 hover:text-red-700 p-2 rounded-full hover:bg-red-50 transition-colors duration-200" title="Delete and Skip Item">
                <i class="fa-solid fa-trash-can fa-lg"></i>
            </button>
            <button type="button" id="ocr-add-btn" class="submit-button flex items-center">
                <i class="fa-solid fa-plus mr-2"></i>
                Add to Bill
            </button>
        </div>
    </div>
</div>
                </div>
              </div>
            </div>
          </div>

          <div id="selection-actions" class="hidden bg-blue-50 border border-blue-200 rounded-lg p-3 mb-6">
            <div class="flex items-center justify-between">
              <span id="selection-count" class="text-blue-800 font-medium"></span>
              <div class="flex items-center space-x-2">
                <button class="bg-red-500 ...">
                  <i class="fa-solid fa-trash-can"></i>
                  <span>Delete</span>
                </button>
                <button class="bg-green-500 ...">
                  <i class="fa-solid fa-copy"></i>
                  <span>Copy</span>
                </button>
                <button class="bg-orange-500 ...">
                  <i class="fa-solid fa-arrow-right-from-bracket"></i>
                  <span>Move</span>
                </button>
              </div>
            </div>
          </div>

          <div>
            <h2 class="text-xl font-semibold mb-4 text-gray-800">
              Bill Items
            </h2>
            <div class="overflow-x-auto">
              <table class="w-full text-left">
                <thead>
                  <tr class="bg-gray-100 text-gray-600 uppercase text-sm newrow">
                    <th class="py-3 px-4 font-semibold">
                      <input type="checkbox" id="select-all-items" />
                    </th>
                    <th class="py-3 px-4 font-semibold">S.No.</th>
                    <th class="py-3 px-4 font-semibold">Item Name</th>
                    <th class="py-3 px-4 font-semibold">Quantity</th>
                    <th class="py-3 px-4 font-semibold">Price</th>
                    <th class="py-3 px-4 font-semibold">Taxable Value</th>
                    <th class="py-3 px-4 font-semibold">CGST %</th>
                    <th class="py-3 px-4 font-semibold">CGST Amount</th>
                    <th class="py-3 px-4 font-semibold">SGST %</th>
                    <th class="py-3 px-4 font-semibold">SGST Amount</th>
                    <th class="py-3 px-4 font-semibold">Total Amount</th>
                    <th class="py-3 px-4 font-semibold text-center">
                      Edit / Delete
                    </th>
                  </tr>
                </thead>
                <tbody class="text-gray-700" id="bill-items-body">

                </tbody>
              </table>
            </div>
            <div class="flex justify-end mt-6 bg-blue-50 p-4 rounded-lg">
              <div class="text-right">
                <span class="text-lg font-medium text-gray-600">Grand Total:</span>
                <span class="text-2xl font-bold text-blue-600 ml-4" id="grand-total"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <button
    class="fixed bottom-8 right-8 bg-blue-600 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-2xl hover:bg-blue-700 transition-transform transform hover:scale-110">
    <i class="fa-solid fa-headset"></i>
  </button>
