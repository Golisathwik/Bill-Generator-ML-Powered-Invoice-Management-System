<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sankalpa Enterprises</title>
    <script src="{{ url_for('static', filename='js/tailwind.min.js') }}"></script>



<link rel="stylesheet" href="{{ url_for('static', filename='css/inter_fonts.css') }}" />


    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="flex min-h-screen">
        <!-- Left Pane with Branding -->
        <div class="hidden lg:flex flex-1 items-center justify-center bg-gradient-to-br from-blue-700 to-indigo-900 text-white p-12 relative overflow-hidden">
            <div class="absolute inset-0 bg-cover bg-center opacity-10" style="background-image: url('https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?q=80&w=2940&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');"></div>
            <div class="relative z-10 text-center">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Sankalpa Enterprises Logo" class="mx-auto mb-6 h-32 w-auto drop-shadow-lg">
                <h1 class="text-5xl font-extrabold mb-3 leading-tight">Sankalpa Enterprises</h1>
                <p class="text-xl text-blue-200 opacity-90">Intuitive Business Management</p>
            </div>
        </div>
        <!-- Right Pane with Login Form -->
        <div class="flex flex-1 flex-col justify-center items-center p-6 lg:p-12">
            <div class="w-full max-w-md">
                <h2 class="text-3xl font-bold text-gray-800 mb-2 text-center">Admin Access</h2>
                <p class="text-gray-500 mb-8 text-center">Please sign in to continue.</p>
                
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg relative mb-4" role="alert">
                                <span class="block sm:inline">{{ message }}</span>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form action="{{ url_for('login') }}" method="POST" class="space-y-6">
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
                        <input type="text" id="username" name="username" required
                               class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                        <input type="password" id="password" name="password" required
                               class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <button type="submit"
                                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors duration-300">
                            Sign In
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
